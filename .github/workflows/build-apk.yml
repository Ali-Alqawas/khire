name: Build Flutter APK

on:
  workflow_dispatch: # هذا السطر يسمح لك بتشغيل البناء يدوياً بضغطة زر
  push:
    branches:
      - main
      - master # يعمل تلقائياً إذا رفعت تعديلات على هذين الفرعين

jobs:
  build:
    runs-on: ubuntu-latest # استخدام سيرفر أوبونتو سريع

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # توافق ممتاز مع إصدارات Gradle الحديثة

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK (Debug)
        run: flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: appkhire # اسم الملف الذي ستحمله لاحقاً
          path: build/app/outputs/apk/debug/app-debug.apk # مسارك الصحيح الذي حددناه سابقاً
